<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Story Writer</title>
    </head>
    <body>
        <!--
      React mounts into this div.
      main.jsx finds this element by id="root" and injects the entire app here.
    -->
        <div id="root"></div>

        <!--
      This script tag tells the browser to load main.jsx as an ES module.
      Vite handles the rest — converts JSX, bundles files, etc.
    -->
        <script type="module" src="/src/main.jsx"></script>
    </body>
</html>
